<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ManSaathi Chat</title>
    <style>
        /* GLOBAL RESET */
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        /* HEADER */
        .header {
            position: relative;
            text-align: center;
            padding: 20px;
            padding-top: 40px;
            flex-shrink: 0;
        }

        /* BACK BUTTON */
        .backBtn {
            position: absolute;
            left: 20px;
            top: 35px;
            border-radius: 20px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.25s;
            z-index: 10;
        }

        .backBtn:hover {
            background: #334155;
            transform: scale(1.05);
        }

        /* MENU THREE DOTS */
        #menuBtn {
            position: absolute;
            right: 20px;
            top: 35px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
        }

        .menuBox {
            display: none;
            position: absolute;
            right: 20px;
            top: 75px;
            background: #1e293b;
            border-radius: 12px;
            min-width: 150px;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .menuBox div {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
        }

        .menuBox div:hover {
            background: #334155;
            border-radius: 12px;
        }

        /* TITLE & SUBTITLE */
        .title {
            font-size: clamp(28px, 5vw, 36px);
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            background: linear-gradient(90deg, #6ee7d6, #22d3ee, #6ee7d6);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowMove 5s linear infinite;
        }

        .subtitle {
            opacity: 0.75;
            font-size: 14px;
            margin-top: 6px;
            min-height: 20px;
        }

        @keyframes glowMove {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* CHAT AREA */
        .chatArea {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
            width: 100%;
            scrollbar-width: none;
            position: relative;
        }

        .chatArea::-webkit-scrollbar {
            display: none;
        }

        /* MESSAGES ORIGINAL STYLE */
        .aiMsg, .userMsg {
            padding: 12px 16px;
            max-width: 75%;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeUp 0.25s ease;
        }

        .aiMsg {
            background: #2c3e50;
            border-radius: 16px 16px 16px 6px;
            align-self: flex-start;
        }

        .userMsg {
            background: #6ee7d6;
            color: black;
            border-radius: 16px 16px 6px 16px;
            align-self: flex-end;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* INPUT AREA FIXED BOTTOM */
        .inputContainer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px;
            max-width: 700px;
            width: 100%;
            background: transparent;
            z-index: 10;
        }

        /* RAINBOW OUTER BORDER */
        .chatBox {
            width: 100%;
            padding: 3px;
            border-radius: 30px;
            background: linear-gradient(90deg, #00f5ff, #00ff9d, #ffd000, #ff00ea, #00f5ff);
            background-size: 400%;
            animation: borderMove 7s linear infinite;
        }

        /* INNER INPUT AREA */
        .inputArea {
            width: 100%;
            background: #1e293b;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            resize: none;
            min-height: 30px;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 5px 0;
        }

        textarea::-webkit-scrollbar {
            display: none;
        }

        /* SEND BUTTON */
        .sendBtn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #22d3ee;
            color: black;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* NEW CHAT BUTTON FLOATING */
        .newChatBtn {
            position: fixed;
            bottom: 85px;
            right: 20px;
            padding: 12px 18px;
            border-radius: 50px;
            border: none;
            background: black;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 5;
            display: none; /* dynamically used if needed */
        }

        /* SMART SCROLL BUTTON POSITIONED PERFECTLY IN CHAT */
        #scrollBtn {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #111111;
            color: #ffffff;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 99;
        }

        #badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #22c55e;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
        }

        /* ANIMATIONS */
        @keyframes borderMove {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="backBtn" onclick="goBack()">← Back</button>
    <div class="title">ManSaathi</div>
    <div class="subtitle" id="subtitle"></div>
    <button id="menuBtn">⋮</button>
    <div id="menuBox" class="menuBox">
        <div onclick="handleClearChat()">Clear Chat</div>
    </div>
</div>

<div class="chatArea" id="chatArea"></div>

<div class="inputContainer">
    <div class="chatBox">
        <div class="inputArea">
            <textarea id="userInput" placeholder="Type your message..." spellcheck="false"></textarea>
            <button class="sendBtn" id="sendBtnButton">➤</button>
        </div>
    </div>
</div>

<div id="scrollBtn">
    ↓ <span id="badge">0</span>
</div>

<script>
const texts = [
    "Share what you feel. I'm here to listen.",
    "A safe space for your thoughts.",
    "Talk about your mood and feelings.",
    "You are not alone here.",
    "Say anything that's on your mind."
];

let textIndex = 0;
let charIndex = 0;
const subtitleEl = document.getElementById("subtitle");

function typeText(){
    if(charIndex < texts[textIndex].length){
        subtitleEl.innerHTML += texts[textIndex].charAt(charIndex);
        charIndex++;
        setTimeout(typeText, 50);
    } else {
        setTimeout(() => {
            subtitleEl.innerHTML = "";
            charIndex = 0;
            textIndex = (textIndex + 1) % texts.length;
            typeText();
        }, 2000);
    }
}
typeText();

// Textarea Auto-grow Setup
let textarea = document.getElementById("userInput");
textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
});

// Chat Configurations
const chatType = sessionStorage.getItem("chatType") || "default";
let chatHistoryKey = `chatHistory_${chatType}`;

const chatConfig = {
    happy_fun: { firstMessage: "Hey 😄 aaj thoda fun karte hain. Tum kya dekhna ya baat karna chahte ho?" },
    happy_affirm: { firstMessage: "Aaj positivity ko aur strong banate hain ✨ ek achchi si baat share karo." },
    happy_energy: { firstMessage: "Awesome ⚡ chalo aaj energy ko action me badalte hain. Kya karna chahte ho?" },
    happy_music: { firstMessage: "Nice 🎵 aaj ka mood musical hai. Tumhe kis type ka music pasand hai?" },
    sad_relax: { firstMessage: "Main yaha hoon 🤍 pehle aaram se saans lo. Kya tum thoda share karna chahoge?" },
    sad_healing: { firstMessage: "Koi baat nahi, aaram se bolo 🌿 jo feel ho raha hai, main sun raha hoon." },
    sad_calm: { firstMessage: "Chalo thoda calm hote hain 🎶 tumhe abhi sabse zyada kis cheez ki zarurat lag rahi hai?" },
    sad_quotes: { firstMessage: "Kabhi kabhi ek achchi line bhi dil ko halka kar deti hai 📝 tum kya feel kar rahe ho?" },
    love_quotes: { firstMessage: "Love is in the air ❤️ kya tum romantic quotes chahte ho ya kisi special ke liye message?" },
    love_guidance: { firstMessage: "Chalo relationship ko better banane ki baat karte hain 🤝 kya confusion hai?" },
    love_confidence: { firstMessage: "Confidence attractive hoti hai 🔥 tum kis situation me confident banna chahte ho?" },
    love_motivation: { firstMessage: "Dil ko halka aur strong dono rakhte hain 😊 aaj tumhe kis type ki positivity chahiye?" },
    breakup_healing: { firstMessage: "Heartbreak tough hota hai 💔 lekin tum akela nahi ho. Jo feel ho raha hai bata sakte ho." },
    breakup_moveon: { firstMessage: "Aaj ek step aage badhte hain 🌸 chhota hi sahi. Sabse zyada kis baat se hurt ho?" },
    breakup_growth: { firstMessage: "Pain ko growth me badalna possible hai 🌱 chalo dheere dheere start karte hain." },
    breakup_mindset: { firstMessage: "Tum soch se zyada strong ho 🧠 chalo mind ko stable banate hain." },
    motivation_daily: { firstMessage: "Let's go 🚀 aaj ka target kya hai?" },
    motivation_study: { firstMessage: "Focus mode on 🎯 aaj kis subject ya kaam par dhyan dena hai?" },
    motivation_success: { firstMessage: "Badi growth chhote disciplined steps se aati hai 📈 tumhara goal kya hai?" },
    motivational_mental: { firstMessage: "Strong mind, stable life 🧘 aaj tum apne aap ko kaise better banana chahte ho?" },
    auto_mood: { firstMessage: "Bas normal baat karo 🤖 main tumhare mood ko samajhne ki koshish karunga." },
    free_chat: { firstMessage: "Jo dil me hai woh bolo 💬 main yaha hoon." }
};

const chatArea = document.getElementById("chatArea");

// Load and Render Messages
function loadChatScreen() {
    chatArea.innerHTML = "";
    let history = JSON.parse(localStorage.getItem(chatHistoryKey)) || [];
    
    if(history.length === 0){
        const firstMsg = chatConfig[chatType]?.firstMessage || "Hey 👋 main yaha hoon. Aaj tum kaise feel kar rahe ho?";
        history.push({type: "ai", text: firstMsg});
        localStorage.setItem(chatHistoryKey, JSON.stringify(history));
    }
    
    history.forEach(msg => {
        let div = document.createElement("div");
        div.className = msg.type === "user" ? "userMsg" : "aiMsg";
        div.innerText = msg.text;
        chatArea.appendChild(div);
    });
    chatArea.scrollTop = chatArea.scrollHeight;
}

// Initial Screen load
loadChatScreen();

// Send Message Logic
function sendMessage() {
    let text = textarea.value.trim();
    if(text === "") return;

    // 1. Render User Message
    let userDiv = document.createElement("div");
    userDiv.className = "userMsg";
    userDiv.innerText = text;
    chatArea.appendChild(userDiv);

    // Save To Storage
    let history = JSON.parse(localStorage.getItem(chatHistoryKey)) || [];
    history.push({type: "user", text: text});
    localStorage.setItem(chatHistoryKey, JSON.stringify(history));

    textarea.value = "";
    textarea.style.height = "auto";
    chatArea.scrollTop = chatArea.scrollHeight;

    // 2. Render AI Typing
    let typingDiv = document.createElement("div");
    typingDiv.className = "aiMsg";
    typingDiv.innerText = "ManSaathi is Typing...";
    chatArea.appendChild(typingDiv);
    chatArea.scrollTop = chatArea.scrollHeight;

    // 3. AI Reply Simulation
    setTimeout(() => {
        typingDiv.remove();
        let aiText = "Main samajh raha hoon… agar chaho to aur share kar sakte ho.";
        let aiDiv = document.createElement("div");
        aiDiv.className = "aiMsg";
        aiDiv.innerText = aiText;
        chatArea.appendChild(aiDiv);

        // Save AI response
        history.push({type: "ai", text: aiText});
        localStorage.setItem(chatHistoryKey, JSON.stringify(history));
        
        chatArea.scrollTop = chatArea.scrollHeight;
    }, 1200);
}

// Send via Button & Enter Key Event
document.getElementById("sendBtnButton").onclick = sendMessage;
textarea.addEventListener("keypress", function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }
});

// Go Back Handler
function goBack(){
    localStorage.setItem("lastScreen", "mood");
    window.location.href = "index.html";
}

// WhatsApp Style Smooth Real Clear Chat (No Refresh Layout Safe)
function handleClearChat() {
    if(confirm("Kya aap sach me ye chat clear karna chahte hain?")) {
        let history = JSON.parse(localStorage.getItem(chatHistoryKey)) || [];
        if (history.length > 0) {
            // Sirf AI ka sabse pehla message secure rakhein baki sab clear
            let firstMsgOnly = [history[0]];
            localStorage.setItem(chatHistoryKey, JSON.stringify(firstMsgOnly));
        }
        menuBox.style.display = "none";
        // Smooth render live chat interface without screen dynamic breakdown
        loadChatScreen();
    }
}

// Three Dot Menu Controllers
const menuBtn = document.getElementById("menuBtn");
const menuBox = document.getElementById("menuBox");

menuBtn.onclick = (e) => {
    e.stopPropagation();
    menuBox.style.display = (menuBox.style.display === "block") ? "none" : "block";
};

document.addEventListener("click", (e) => {
    if (!menuBtn.contains(e.target) && !menuBox.contains(e.target)) {
        menuBox.style.display = "none";
    }
});

// Smooth Scroll to Bottom Engine
const scrollBtn = document.getElementById("scrollBtn");
chatArea.addEventListener("scroll", () => {
    const distance = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight;
    if (distance > 150) {
        scrollBtn.style.display = "flex";
    } else {
        scrollBtn.style.display = "none";
    }
});

scrollBtn.onclick = () => {
    chatArea.scrollTo({
        top: chatArea.scrollHeight,
        behavior: "smooth"
    });
};
</script>

</body>
</html>
