<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ManSaathi Chat</title>
    <style>
        /* GLOBAL RESET */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        /* PREMIUM HEADER */
        .header {
            position: relative;
            text-align: center;
            padding: 16px;
            padding-top: 35px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        /* BACK BUTTON */
        .backBtn {
            position: absolute;
            left: 20px;
            top: 32px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.07);
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 11;
        }

        .backBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* THREE DOTS MENU BUTTON */
        #menuBtn {
            position: absolute;
            right: 20px;
            top: 26px;
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 11;
        }

        /* DROPDOWN MENU */
        .menuBox {
            display: none;
            position: absolute;
            right: 20px;
            top: 75px;
            background: #1e293b;
            border-radius: 12px;
            min-width: 160px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .menuBox div {
            padding: 12px 18px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: background 0.2s ease;
        }

        .menuBox div:hover {
            background: #334155;
        }

        /* TITLE & SUBTITLE */
        .title {
            font-size: clamp(26px, 5vw, 34px);
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #6ee7d6, #22d3ee, #6ee7d6);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowMove 5s linear infinite;
        }

        .subtitle {
            opacity: 0.75;
            font-size: 13px;
            margin-top: 5px;
            min-height: 18px;
            color: #94a3b8;
        }

        @keyframes glowMove {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* RESPONSIVE CHAT AREA */
        .chatArea {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px;
            width: 100%;
            scrollbar-width: none;
        }

        .chatArea::-webkit-scrollbar {
            display: none;
        }

        /* MESSAGE BUBBLES */
        .aiMsg, .userMsg {
            padding: 12px 16px;
            max-width: 75%;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
            animation: fadeUp 0.25s ease-out forwards;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .aiMsg {
            background: #2c3e50;
            color: #f8fafc;
            border-radius: 16px 16px 16px 4px;
            align-self: flex-start;
        }

        .userMsg {
            background: #6ee7d6;
            color: #0f172a;
            border-radius: 16px 16px 4px 16px;
            align-self: flex-end;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        /* FIXED BOTTOM INPUT CONTAINER */
        .inputContainer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px 20px 20px;
            max-width: 680px;
            width: 100%;
            background: transparent;
            z-index: 10;
        }

        /* RAINBOW BORDER CONTAINER */
        .chatBox {
            width: 100%;
            padding: 2px;
            border-radius: 30px;
            background: linear-gradient(90deg, #00f5ff, #00ff9d, #ffd000, #ff00ea, #00f5ff);
            background-size: 400%;
            animation: borderMove 7s linear infinite;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        /* INNER CONTAINER */
        .inputArea {
            width: 100%;
            background: #1e293b;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            resize: none;
            min-height: 28px;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 6px 0;
        }

        textarea::-webkit-scrollbar {
            display: none;
        }

        /* SEND BUTTON */
        .sendBtn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #22d3ee;
            color: #0f172a;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.1s ease;
        }

        .sendBtn:active {
            transform: scale(0.85);
        }

        /* FLOATING SCROLL BUTTON */
        #scrollBtn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e293b;
            color: #22d3ee;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            z-index: 9;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #22c55e;
            color: #000;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
        }

        /* PREMIUM WHATSAPP DIALOG POPUP */
        .modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        

        .modalBox h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #f8fafc;
        }

        .modalBox p {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.4;
        }

        .modalButtons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modalBtn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .modalBtn.cancel {
            background: transparent;
            color: #94a3b8;
        }

        .modalBtn.cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .modalBtn.clear {
            background: #ef4444;
            color: white;
        }

        .modalBtn.clear:hover {
            background: #dc2626;
        }

        /* KEYFRAMES ANIMATIONS */
        @keyframes borderMove {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="clearModal" class="modalOverlay">
    <div class="modalBox">
        <h3>Clear Chat?</h3>
        <p>Kya aap sach me is chat ke saare messages ko hamesha ke liye mitaana chahte hain?</p>
        <div class="modalButtons">
            <button class="modalBtn cancel" onclick="closeClearModal()">Cancel</button>
            <button class="modalBtn clear" onclick="executeClearChat()">Clear Chat</button>
        </div>
    </div>
</div>

<div class="header">
    <button class="backBtn" onclick="goBack()">← Back</button>
    <div class="title">ManSaathi</div>
    <div class="subtitle" id="subtitle"></div>
    <button id="menuBtn">⋮</button>
    <div id="menuBox" class="menuBox">
        <div onclick="openClearModal()">Clear Chat</div>
    </div>
</div>

<div class="chatArea" id="chatArea"></div>

<div class="inputContainer">
    <div class="chatBox">
        <div class="inputArea">
            <textarea id="userInput" placeholder="Type your message..." spellcheck="false"></textarea>
            <button class="sendBtn" id="sendBtnButton">➤</button>
        </div>
    </div>
</div>

<div id="scrollBtn">↓ <span id="badge">0</span></div>

<script>
// Subtitle Text Typer Effect
const texts = [
    "Share what you feel. I'm here to listen.",
    "A safe space for your thoughts.",
    "Talk about your mood and feelings.",
    "You are not alone here.",
    "Say anything that's on your mind."
];

let textIndex = 0;
let charIndex = 0;
const subtitleEl = document.getElementById("subtitle");

function typeText(){
    if(charIndex < texts[textIndex].length){
        subtitleEl.innerHTML += texts[textIndex].charAt(charIndex);
        charIndex++;
        setTimeout(typeText, 50);
    } else {
        setTimeout(() => {
            subtitleEl.innerHTML = "";
            charIndex = 0;
            textIndex = (textIndex + 1) % texts.length;
            typeText();
        }, 2000);
    }
}
typeText();

// Textarea Auto-grow Handler
let textarea = document.getElementById("userInput");
textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
});

// Chat Sessions & Keys Configuration
const chatType = sessionStorage.getItem("chatType") || "default";
let chatHistoryKey = `chatHistory_${chatType}`;

const chatConfig = {
    happy_fun: { firstMessage: "Hey 😄 aaj thoda fun karte hain. Tum kya dekhna ya baat karna chahte ho?" },
    happy_affirm: { firstMessage: "Aaj positivity ko aur strong banate hain ✨ ek achchi si baat share karo." },
    happy_energy: { firstMessage: "Awesome ⚡ chalo aaj energy ko action me badalte hain. Kya karna chahte ho?" },
    happy_music: { firstMessage: "Nice 🎵 aaj ka mood musical hai. Tumhe kis type ka music pasand hai?" },
    sad_relax: { firstMessage: "Main yaha hoon 🤍 pehle aaram se saans lo. Kya tum thoda share karna chahoge?" },
    sad_healing: { firstMessage: "Koi baat nahi, aaram se bolo 🌿 jo feel ho raha hai, main sun raha hoon." },
    sad_calm: { firstMessage: "Chalo thoda calm hote hain 🎶 tumhe abhi sabse zyada kis cheez ki zarurat lag rahi hai?" },
    sad_quotes: { firstMessage: "Kabhi kabhi ek achchi line bhi dil ko halka kar deti hai 📝 tum kya feel kar rahe ho?" },
    love_quotes: { firstMessage: "Love is in the air ❤️ kya tum romantic quotes chahte ho ya kisi special ke liye message?" },
    love_guidance: { firstMessage: "Chalo relationship ko better banane ki baat karte hain 🤝 kya confusion hai?" },
    love_confidence: { firstMessage: "Confidence attractive hoti hai 🔥 tum kis situation me confident banna chahte ho?" },
    love_motivation: { firstMessage: "Dil ko halka aur strong dono rakhte hain 😊 aaj tumhe kis type ki positivity chahiye?" },
    breakup_healing: { firstMessage: "Heartbreak tough hota hai 💔 lekin tum akela nahi ho. Jo feel ho raha hai bata sakte ho." },
    breakup_moveon: { firstMessage: "Aaj ek step aage badhte hain 🌸 chhota hi sahi. Sabse zyada kis baat se hurt ho?" },
    breakup_growth: { firstMessage: "Pain ko growth me badalna possible hai 🌱 chalo dheere dheere start karte hain." },
    breakup_mindset: { hisstMessage: "Tum soch se zyada strong ho 🧠 chalo mind ko stable banate hain." },
    motivation_daily: { firstMessage: "Let's go 🚀 aaj ka target kya hai?" },
    motivation_study: { firstMessage: "Focus mode on 🎯 aaj kis subject ya kaam par dhyan dena hai?" },
    motivation_success: { firstMessage: "Badi growth chhote disciplined steps se aati hai 📈 tumhara goal kya hai?" },
    motivational_mental: { firstMessage: "Strong mind, stable life 🧘 aaj tum apne aap ko kaise better banana chahte ho?" },
    auto_mood: { firstMessage: "Bas normal baat karo 🤖 main tumhare mood ko samajhne ki koshish karunga." },
    free_chat: { firstMessage: "Jo dil me hai woh bolo 💬 main yaha hoon." }
};

const chatArea = document.getElementById("chatArea");

// Core Loader Engine (Load and Display Storage Safely)
function loadChatScreen() {
    chatArea.innerHTML = "";
    let history = [];
    
    try {
        let stored = localStorage.getItem(chatHistoryKey);
        if(stored) {
            history = JSON.parse(stored);
        }
    } catch(e) {
        console.error("History parse error", e);
    }
    
    // Default system boot if history array is empty
    if(!Array.isArray(history) || history.length === 0){
        const firstMsg = chatConfig[chatType]?.firstMessage || "Hey 👋 main yaha hoon. Aaj tum kaise feel kar rahe ho?";
        history = [{type: "ai", text: firstMsg}];
        localStorage.setItem(chatHistoryKey, JSON.stringify(history));
    }
    
    // Append divs dynamically
    history.forEach(msg => {
        let div = document.createElement("div");
        div.className = msg.type === "user" ? "userMsg" : "aiMsg";
        div.innerText = msg.text;
        chatArea.appendChild(div);
    });
    
    // Handle Auto-Scroll positioning
    setTimeout(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
    }, 50);
}

// Initializing Engine Boot
loadChatScreen();

// Messaging Handler Dispatch System
function sendMessage() {
    let text = textarea.value.trim();
    if(text === "") return;

    // 1. Render User Message Node
    let userDiv = document.createElement("div");
    userDiv.className = "userMsg";
    userDiv.innerText = text;
    chatArea.appendChild(userDiv);

    // Save To Storage Array
    let history = JSON.parse(localStorage.getItem(chatHistoryKey)) || [];
    history.push({type: "user", text: text});
    localStorage.setItem(chatHistoryKey, JSON.stringify(history));

    textarea.value = "";
    textarea.style.height = "auto";
    chatArea.scrollTop = chatArea.scrollHeight;

    // 2. Render Temporary AI Typing State
    let typingDiv = document.createElement("div");
    typingDiv.className = "aiMsg";
    typingDiv.innerText = "ManSaathi is Typing...";
    chatArea.appendChild(typingDiv);
    chatArea.scrollTop = chatArea.scrollHeight;

    // 3. Simulated Async AI Reply Promise Execution
    setTimeout(() => {
        typingDiv.remove();
        let aiText = "Main samajh raha hoon… agar chaho to aur share kar sakte ho.";
        let aiDiv = document.createElement("div");
        aiDiv.className = "aiMsg";
        aiDiv.innerText = aiText;
        chatArea.appendChild(aiDiv);

        // Commit AI msg block to stack
        history.push({type: "ai", text: aiText});
        localStorage.setItem(chatHistoryKey, JSON.stringify(history));
        
        chatArea.scrollTop = chatArea.scrollHeight;
    }, 1200);
}

// Attach IO triggers
document.getElementById("sendBtnButton").onclick = sendMessage;
textarea.addEventListener("keypress", function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }
});

// App Nav Redirection
function goBack(){
    localStorage.setItem("lastScreen", "mood");
    window.location.href = "index.html";
}

// Modal Windows Control Layers
const clearModal = document.getElementById("clearModal");
const menuBox = document.getElementById("menuBox");
const menuBtn = document.getElementById("menuBtn");

function openClearModal() {
    menuBox.style.display = "none";
    clearModal.style.display = "flex";
}

function closeClearModal() {
    clearModal.style.display = "none";
}

function executeClearChat() {
    try {
        let history = JSON.parse(localStorage.getItem(chatHistoryKey)) || [];
        if (history.length > 0) {
            // Secure 1st AI greeting message block safely
            let firstMsgOnly = [history[0]];
            localStorage.setItem(chatHistoryKey, JSON.stringify(firstMsgOnly));
        }
    } catch (err) {
        console.error(err);
    }
    closeClearModal();
    // Live UI rebuild engine
    loadChatScreen();
}

// Header Dynamic Dropdown Controller Menu
menuBtn.onclick = (e) => {
    e.stopPropagation();
    menuBox.style.display = (menuBox.style.display === "block") ? "none" : "block";
};

document.addEventListener("click", (e) => {
    if (!menuBtn.contains(e.target) && !menuBox.contains(e.target)) {
        menuBox.style.display = "none";
    }
});

// Scroll to Bottom Controls Engine Layout Anchor
const scrollBtn = document.getElementById("scrollBtn");
chatArea.addEventListener("scroll", () => {
    const distance = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight;
    if (distance > 180) {
        scrollBtn.style.display = "flex";
    } else {
        scrollBtn.style.display = "none";
    }
});

scrollBtn.onclick = () => {
    chatArea.scrollTo({
        top: chatArea.scrollHeight,
        behavior: "smooth"
    });
};
</script>

</body>
</html>
