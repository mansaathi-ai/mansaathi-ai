<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ManSaathi Chat</title>
    <style>
        /* GLOBAL RESET & SMOOTHING */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        /* PREMIUM GLASSMORPHIC HEADER */
        .header {
            position: relative;
            text-align: center;
            padding: 16px;
            padding-top: 35px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        /* BACK BUTTON */
        .backBtn {
            position: absolute;
            left: 20px;
            top: 32px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.07);
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 11;
        }

        .backBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* THREE DOTS MENU BUTTON */
        #menuBtn {
            position: absolute;
            right: 20px;
            top: 26px;
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
            padding: 5px 10px;
            transition: opacity 0.2s;
            z-index: 11;
        }

        /* PREMIUM DROPDOWN MENU */
        .menuBox {
            display: none;
            position: absolute;
            right: 20px;
            top: 75px;
            background: #1e293b;
            border-radius: 12px;
            min-width: 160px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transform-origin: top right;
            transition: all 0.2s ease;
        }

        .menuBox div {
            padding: 12px 18px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: background 0.2s ease;
        }

        .menuBox div:hover {
            background: #334155;
        }

        /* ANIMATED GLOWING TITLE */
        .title {
            font-size: clamp(26px, 5vw, 34px);
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #6ee7d6, #22d3ee, #6ee7d6);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowMove 5s linear infinite;
        }

        .subtitle {
            opacity: 0.75;
            font-size: 13px;
            margin-top: 5px;
            min-height: 18px;
            color: #94a3b8;
        }

        @keyframes glowMove {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* RESPONSIVE & CLEAN CHAT AREA */
        .chatArea {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px;
            width: 100%;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .chatArea::-webkit-scrollbar {
            display: none;
        }

        /* SMOOTH FLUID MESSAGE BUBBLES */
        .aiMsg, .userMsg {
            padding: 12px 16px;
            max-width: 75%;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
            transform-origin: bottom center;
            animation: fluidMsg 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .aiMsg {
            background: #2c3e50;
            color: #f8fafc;
            border-radius: 16px 16px 16px 4px;
            align-self: flex-start;
        }

        .userMsg {
            background: #6ee7d6;
            color: #0f172a;
            border-radius: 16px 16px 4px 16px;
            align-self: flex-end;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        /* PREMIUM FLOATING INPUT BAR */
        .inputContainer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px 20px 20px;
            max-width: 680px;
            width: 100%;
            background: transparent;
            z-index: 10;
        }

        /* ORIGINAL RAINBOW BORDER CONTAINER */
        .chatBox {
            width: 100%;
            padding: 2px;
            border-radius: 30px;
            background: linear-gradient(90deg, #00f5ff, #00ff9d, #ffd000, #ff00ea, #00f5ff);
            background-size: 400%;
            animation: borderMove 7s linear infinite;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        /* INNER CONTAINER */
        .inputArea {
            width: 100%;
            background: #1e293b;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            resize: none;
            min-height: 28px;
            max-height: 120px;
            line-height: 1.4;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 6px 0;
        }

        textarea::-webkit-scrollbar {
            display: none;
        }

        /* SEND BUTTON */
        .sendBtn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #22d3ee;
            color: #0f172a;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sendBtn:active {
            transform: scale(0.85);
            background: #6ee7d6;
        }

        /* FLOATING SCROLL BUTTON WITHIN CHAT AREA */
        #scrollBtn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e293b;
            color: #22d3ee;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            z-index: 9;
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #scrollBtn.visible {
            display: flex;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #scrollBtn:hover {
            background: #334155;
        }

        #badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #22c55e;
            color: #000;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
        }

        /* PREMIUM GLASSMORPHIC DIALOG MODAL */
        .modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .modalOverlay.active {
            opacity: 1;
        }

        .modalBox {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.6);
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modalOverlay.active .modalBox {
            transform: scale(1);
        }

        .modalBox h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #f8fafc;
        }

        .modalBox p {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.4;
        }

        .modalButtons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modalBtn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .modalBtn.cancel {
            background: transparent;
            color: #94a3b8;
        }

        .modalBtn.cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .modalBtn.clear {
            background: #ef4444;
            color: white;
        }

        .modalBtn.clear:hover {
            background: #dc2626;
        }

        /* ADVANCED CORE ANIMATIONS */
        @keyframes borderMove {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        @keyframes fluidMsg {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

<div id="clearModal" class="modalOverlay">
    <div class="modalBox">
        <h3>Clear Chat?</h3>
        <p>Kya aap sach me is chat ke saare messages ko hamesha ke liye mitaana chahte hain?</p>
        <div class="modalButtons">
            <button class="modalBtn cancel" onclick="closeClearModal()">Cancel</button>
            <button class="modalBtn clear" onclick="executeClearChat()">Clear Chat</button>
        </div>
    </div>
</div>

<div class="header">
    <button class="backBtn" onclick="goBack()">← Back</button>
    <div class="title">ManSaathi</div>
    <div class="subtitle" id="subtitle"></div>
    <button id="menuBtn">⋮</button>
    <div id="menuBox" class="menuBox">
        <div onclick="openClearModal()">Clear Chat</div>
    </div>
</div>

<div class="chatArea" id="chatArea"></div>

<div class="inputContainer">
    <div class="chatBox">
        <div class="inputArea">
            <textarea id="userInput" placeholder="Type your message..." spellcheck="false"></textarea>
            <button class="sendBtn" id="sendBtnButton">➤</button>
        </div>
    </div>
</div>

<div id="scrollBtn">↓ <span id="badge">0</span></div>

<script>
const texts = [
    "Share what you feel. I'm here to listen.",

];

let textIndex = 0;
let charIndex = 0;
const subtitleEl = document.getElementById("subtitle");

function typeText(){
    if(charIndex < texts[textIndex].length){
        subtitleEl.innerHTML += texts[textIndex].charAt(charIndex);
        charIndex++;
        setTimeout(typeText, 50);
    } else {
        setTimeout(() => {
            subtitleEl.innerHTML = "";
            charIndex = 0;
            textIndex = (textIndex + 1) % texts.length;
            typeText();
        }, 2000);
    }
}
typeText();

    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
});
